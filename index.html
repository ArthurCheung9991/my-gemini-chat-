<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 Gemini 同步聊天</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 0 auto; padding: 20px; background: #f0f0f0; }
    #chat-box { background: white; height: 400px; overflow-y: auto; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    .msg { margin: 10px 0; padding: 10px; border-radius: 8px; word-break: break-word; }
    .user { background: #e3f2fd; text-align: right; }
    .bot { background: #f5f5f5; text-align: left; }
    input, button { padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ddd; }
    input { width: 60%; }
    button { background: #1a73e8; color: white; border: none; cursor: pointer; }
    #login-box { text-align: center; padding: 50px; }
    .error { color: red; font-size: 12px; }
  </style>
</head>
<body>

  <div id="login-box">
    <h2>🔐 先登入你的帳號</h2>
    <p>輸入你的 Email（手機電腦用同一個）</p>
    <input type="email" id="email" placeholder="your@gmail.com">
    <button onclick="login()">進入聊天室</button>
  </div>

  <div id="chat-app" style="display:none;">
    <h3>💬 Gemini 同步聊天 <span id="user-info"></span></h3>
    <div id="chat-box"></div>
    <div>
      <input type="text" id="message" placeholder="輸入問題..." onkeypress="if(event.key==='Enter')send()">
      <button onclick="send()">送出</button>
    </div>
    <p style="font-size:12px;color:#666;">裝置：<span id="device"></span></p>
  </div>

<script>
  const API_URL = 'https://my-gemini-chat-jet.vercel.app/api/chat';
  let userEmail = '';
  let deviceType = /Mobi|Android/i.test(navigator.userAgent) ? '手機' : '電腦';

  function login() {
    userEmail = document.getElementById('email').value;
    if (!userEmail) return alert('請輸入 Email');
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('chat-app').style.display = 'block';
    document.getElementById('user-info').innerText = '(' + userEmail + ')';
    document.getElementById('device').innerText = deviceType;
    loadHistory();
  }

  async function loadHistory() {
    document.getElementById('chat-box').innerHTML += '<div class="msg bot">👋 歡迎！你現在在用 ' + deviceType + '。開始聊天吧！</div>';
  }

  async function send() {
    const msgInput = document.getElementById('message');
    const msg = msgInput.value.trim();
    if (!msg) return;
    
    const box = document.getElementById('chat-box');
    box.innerHTML += '<div class="msg user"><b>你：</b>' + msg + '</div>';
    msgInput.value = '';
    box.scrollTop = box.scrollHeight;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, user_email: userEmail, device: deviceType })
      });
      
      if (!res.ok) {
        const errorText = await res.text();
        box.innerHTML += '<div class="msg bot error"><b>錯誤：</b>狀態碼 ' + res.status + ' - ' + errorText.substring(0, 200) + '</div>';
        box.scrollTop = box.scrollHeight;
        return;
      }
      
      const data = await res.json();
      
      let responseText = '無回應';
      if (data.response) {
        responseText = data.response;
      } else if (data.error) {
        responseText = '錯誤：' + data.error;
      } else {
        responseText = '未知回應：' + JSON.stringify(data).substring(0, 200);
      }
      
      box.innerHTML += '<div class="msg bot"><b>Gemini：</b>' + responseText + '</div>';
      box.scrollTop = box.scrollHeight;
      
    } catch (e) {
      box.innerHTML += '<div class="msg bot error"><b>錯誤：</b>' + e.message + '</div>';
      box.scrollTop = box.scrollHeight;
    }
  }
</script>

</body>
</html>
